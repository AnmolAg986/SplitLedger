version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: splitledger-db
    environment:
      POSTGRES_USER: sl
      POSTGRES_PASSWORD: sl
      POSTGRES_DB: splitledger
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: splitledger-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data:
