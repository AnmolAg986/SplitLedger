version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: splitledger-db
    environment:
      POSTGRES_USER: sl
      POSTGRES_PASSWORD: sl
      POSTGRES_DB: splitledger
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: splitledger-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: splitledger-backend
    environment:
      - DATABASE_URL=postgres://sl:sl@db:5432/splitledger
      - REDIS_URL=redis://redis:6379
      - PORT=3000
      - NODE_ENV=production
      - CORS_ORIGIN=http://localhost
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    container_name: splitledger-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres-data:
