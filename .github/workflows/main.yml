name: Main Branch Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --recursive run build --if-present

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Images
        run: |
          # The exact push commands depend on the registry configured in docker-compose.yml 
          # For a generic CI step:
          docker compose build
          # To push, services in docker-compose.yml must have `image: registry/repo:tag` configured
          # docker compose push
          
      - name: Deploy to Staging
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          REDIS_URL: ${{ secrets.STAGING_REDIS_URL }}
        run: |
          echo "Deploying to staging environment..."
          # Insert staging deployment commands here (e.g. ssh, kubectl, terraform, caprover)
          
      - name: Run E2E Tests against Staging
        env:
          VITE_API_URL: https://api.staging.splitledger.com
        run: |
          echo "Running E2E tests..."
          pnpm --recursive run test:e2e --if-present
