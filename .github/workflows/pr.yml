name: PR Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --recursive run lint --if-present

      - name: Type Check
        run: pnpm --recursive run type-check --if-present

      - name: Unit Tests
        run: pnpm --recursive run test --if-present

      - name: Integration Tests
        run: pnpm --recursive run test:integration --if-present
